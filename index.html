<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTime - Coming Soon</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b1117;
            color: #ffffff;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }
        
        .text-accent-green { color: #2ecc71; }
        .text-accent-yellow { color: #f1c40f; }
        
        .bg-accent-green { 
            background-color: #2ecc71; 
            color: #0b1117; 
            font-weight: 600; 
            border: none;
        }
        
        .bg-accent-green:hover { 
            background-color: #27ae60; 
            color: #0b1117; 
        }
        
        .form-control {
            background-color: #16212c;
            border: 1px solid #2a3b4c;
            color: #fff;
        }
        
        .form-control:focus {
            background-color: #16212c;
            color: #fff;
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }
        
        .form-control::placeholder {
            color: #6c757d;
        }
        
        .timer-box {
            background-color: #16212c;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a3b4c;
        }
        
        .timer-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f1c40f;
        }
        
        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0aab2;
        }
        
        /* Corner Flower Motifs */
        .corner-flower {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .top-left { top: -30px; left: -30px; transform: rotate(45deg); }
        .top-right { top: -30px; right: -30px; transform: rotate(135deg); }
        .bottom-left { bottom: -30px; left: -30px; transform: rotate(-45deg); }
        .bottom-right { bottom: -30px; right: -30px; transform: rotate(-135deg); }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }

        @media screen (width < 350px) {
            .timer-value{
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="statusToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-bold" id="toastMessage">
                </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>
    <div class="content-wrapper">
        
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold d-flex justify-content-center align-items-center">
                <span><img src="intime-logo.png" alt="Intime-logo" width="80" class="py-5 mx-3"></span>
                <span>InTime</span>
            </h1>

            <h2>Get money for your time. Trade, sell or buy back your time.</h2>
            <p class="lead text-secondary mt-3">InTime<sup>&copy;</sup> platform is launching soon. Join the waitlist.</p>
        </div>

        <div class="row g-2 justify-content-center mb-5" id="countdown">
            <div class="col-3">
                <div class="timer-box">
                    <div class="timer-value" id="days">00</div>
                    <div class="timer-label">Days</div>
                </div>
            </div>
            <div class="col-3">
                <div class="timer-box">
                    <div class="timer-value" id="hours">00</div>
                    <div class="timer-label">Hours</div>
                </div>
            </div>
            <div class="col-3">
                <div class="timer-box">
                    <div class="timer-value" id="minutes">00</div>
                    <div class="timer-label">Mins</div>
                </div>
            </div>
            <div class="col-3">
                <div class="timer-box">
                    <div class="timer-value" id="seconds">00</div>
                    <div class="timer-label">Secs</div>
                </div>
            </div>
        </div>

        <div class="card bg-transparent border-0">
            <div class="card-body p-0">
                <form id="notifyForm">
                    <div class="mb-3">
                        <input type="email" class="form-control form-control-lg" placeholder="Email address" required>
                    </div>
                    <div class="mb-4">
                        <input type="tel" class="form-control form-control-lg" placeholder="Phone number (optional)">
                    </div>
                    <button type="submit" class="btn bg-accent-green btn-lg w-100 rounded-pill">Notify Me</button>
                </form>
            </div>
        </div>
    </div>
<script src=""></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    // Countdown Timer Logic
    const countDownDate = new Date("July 29, 2026 00:00:00").getTime();

    const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
        document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("countdown").innerHTML = "<div class='col-12 text-center text-accent-green fs-4'>We have launched!</div>";
        }
    }, 1000);

    // Form Submission Logic
document.getElementById('notifyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const form = this;
    const submitBtn = form.querySelector('button[type="submit"]');
    const emailInput = form.querySelector('input[type="email"]');
    const phoneInput = form.querySelector('input[type="tel"]');
    
    // Setup the Toast variables
    const toastElement = document.getElementById('statusToast');
    const toastMessage = document.getElementById('toastMessage');
    const toast = new bootstrap.Toast(toastElement, { delay: 4000 }); // Auto-hides after 4 seconds
    
    // Update button state while sending
    const originalBtnText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Adding to list...';

    const formData = new URLSearchParams();
    formData.append('email', emailInput.value);
    formData.append('phone', phoneInput.value);

    const scriptURL = 'https://script.google.com/macros/s/AKfycbylRaXVJiXdyoOvmwVjEgHTYlFaU_nEcrgHp9xjUbeCev70syO0Zu2wioGWO1EbUntgew/exec';

    fetch(scriptURL, {
        method: 'POST',
        body: formData
    })
    .then(response => {
        // Success Toast
        toastMessage.textContent = 'Thank you! You have been added to the waitlist.';
        toastElement.className = 'toast align-items-center border-0 bg-accent-green'; 
        toast.show();
        
        form.reset();
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
    })
    .catch(error => {
        // Error Toast
        console.error('Error!', error.message);
        toastMessage.textContent = 'Something went wrong. Please try again.';
        toastElement.className = 'toast align-items-center border-0 bg-danger text-white';
        toast.show();
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
    });
});
</script>
</body>
</html>
