<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="manifest" href="/site.webmanifest" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b1117;
            color: #ffffff;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }
        
        .text-accent-green { color: #2ecc71; }
        .text-accent-yellow { color: #f1c40f; }
        
        .bg-accent-green { 
            background-color: #2ecc71; 
            color: #0b1117; 
            font-weight: 600; 
            border: none;
        }
        
        .bg-accent-green:hover { 
            background-color: #27ae60; 
            color: #0b1117; 
        }
        
        .form-control {
            background-color: #16212c;
            border: 1px solid #2a3b4c;
            color: #fff;
        }
        
        .form-control:focus {
            background-color: #16212c;
            color: #fff;
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }
        
        .form-control::placeholder {
            color: #6c757d;
        }
        
        .timer-box {
            background-color: #16212c;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a3b4c;
        }
        
        .timer-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f1c40f;
        }
        
        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0aab2;
        }
        
        /* Corner Flower Motifs */
        .corner-flower {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .top-left { top: -30px; left: -30px; transform: rotate(45deg); }
        .top-right { top: -30px; right: -30px; transform: rotate(135deg); }
        .bottom-left { bottom: -30px; left: -30px; transform: rotate(-45deg); }
        .bottom-right { bottom: -30px; right: -30px; transform: rotate(-135deg); }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }

        @media (max-width: 350px) {
            .timer-box{
                padding: 5px;
            }
            .timer-value{
                font-size: 1.5rem;
            }
        }

        /* Video Background Styling */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0; /* Keep it behind the content */
            overflow: hidden;
        }

        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px); /* Controls the amount of blur */
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Uses your #0b1117 background color at 85% opacity to make the video faint */
            background-color: rgba(11, 17, 23, 0.85); 
        }

        /* Ensure the body background is transparent on desktop so the video shows through */
        @media (min-width: 768px) {
            body {
                background-color: transparent;
            }
        }
    </style>

</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <video autoplay loop muted playsinline class="bg-video">

            </video>
            <div class="video-overlay"></div>
        </div>
        <div class="content-wrapper">

            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold d-flex justify-content-center align-items-center">
                    <span><img src="intime-logo.png" alt="Intime-logo" width="80" class="py-5 mx-3"></span>
                    <span>InTime</span>
                </h1>

                <h2>Get money for your time. Trade, sell or buy back your time.</h2>
                <p class="lead mt-3">InTime<sup>&copy;</sup> platform is launching soon. Join the waitlist.</p>
            </div>

            <div class="row g-2 justify-content-center mb-5" id="countdown">

                    <div class="timer-box">
                        <div class="timer-value" id="days">00</div>

                </div>
                <div class="col-3">
                    <div class="timer-box">
                        <div class="timer-value" id="hours">00</div>
                        <div class="timer-label">Hours</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="timer-box">
                        <div class="timer-value" id="minutes">00</div>
                        <div class="timer-label">Mins</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="timer-box">
                        <div class="timer-value" id="seconds">00</div>
                        <div class="timer-label">Secs</div>

            </div>

            <div class="card bg-transparent border-0">
                <div class="card-body p-0">
                    <form id="notifyForm">
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg" placeholder="Email address" required>
                        </div>
                        <div class="mb-4">
                            <input type="tel" class="form-control form-control-lg" placeholder="Phone number (optional)">
                        </div>
                        <button type="submit" class="btn bg-accent-green btn-lg w-100 rounded-pill">Notify Me</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            const countDownDate = new Date("July 29, 2026 00:00:00").getTime();

            const x = setInterval(function () {
                  const now = new Date().getTime();
                  const distance = countDownDate - now;

                  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                  document.getElementById("days").innerHTML = days.toString().padStart(2, "0");
                  document.getElementById("hours").innerHTML = hours.toString().padStart(2, "0");
                  document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, "0");
                  document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, "0");

                  if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML =
                    "<div class='col-12 text-center text-accent-green fs-4'>We have launched!</div>";
                }
            }, 1000);

            document.getElementById("notifyForm").addEventListener("submit", function (e) {
              e.preventDefault();

              const form = this;
              const submitBtn = form.querySelector('button[type="submit"]');
              const emailInput = form.querySelector('input[type="email"]');
              const phoneInput = form.querySelector('input[type="tel"]');

              const toastElement = document.getElementById("statusToast");
              const toastMessage = document.getElementById("toastMessage");
              const toast = new bootstrap.Toast(toastElement, { delay: 4000 });

              const originalBtnText = submitBtn.innerHTML;

              function resetBtn() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = "Verifying...";

            grecaptcha
            .ready(function () {
              grecaptcha
              .execute("6LdTOkotAAAAAE59Fghhc6gW3FZfNxNm0UQpoesG", { action: "submit" })
              .then(function (token) {
                  const formData = new URLSearchParams();
                  formData.append("email", emailInput.value);
                  formData.append("phone", phoneInput.value);
                  formData.append("recaptchaToken", token);


                  submitBtn.innerHTML = "Adding to list...";

                  fetch('/api/submit', {   
                    method: 'POST',
                    body: formData
                })
                  .then(res => res.json())  
                  .then(data => {
                      if (data.result === 'success') {
                        toastMessage.textContent = 'Thank you! You have been added to the waitlist.';
                        toastElement.className = 'toast align-items-center border-0 bg-accent-green';
                        toast.show();
                        form.reset();
                    } else {
                        throw new Error(data.message);
                    }
                })
                  .catch(err => {
                      toastMessage.textContent = err.message || 'Something went wrong. Please try again.';
                      toastElement.className = 'toast align-items-center border-0 bg-danger';
                      toast.show();
                  })
                  .finally(() => resetBtn());
              });
          });

});
      </script>
  </body>
  </html>
